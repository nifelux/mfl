<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MFL</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">MFL</h1>
            <p class="auth-subtitle">Welcome back! Log in to manage your investments</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <div style="display: flex; justify-content: space-between;">
                    <label for="password">Password</label>
                    <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">
                <span class="btn-text">Sign In</span>
                <div class="spinner" id="loader"></div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Create Account</a></p>
        </div>
    </div>

    <script src="assets/js/supabase.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = submitBtn.querySelector('.btn-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading State
            submitBtn.disabled = true;
            btnText.style.opacity = '0.5';
            loader.style.display = 'block';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                if (data.session) {
                    // Success: Redirect to dashboard
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            } finally {
                submitBtn.disabled = false;
                btnText.style.opacity = '1';
                loader.style.display = 'none';
            }
        });

        // If user is already logged in, skip login page
        async function checkExistingSession() {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkExistingSession();
    </script>
</body>
</html>
