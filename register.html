<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join MFL - Start Investing</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">MFL</h1>
            <p class="auth-subtitle">Create an account to start earning daily income</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="08012345678" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>

            <div id="referral-badge" class="referral-info" style="display: none;">
                <span class="icon">🎁</span> Referred by: <strong id="ref-display"></strong>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">
                <span class="btn-text">Create Account</span>
                <div class="spinner" id="loader"></div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/supabase.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = submitBtn.querySelector('.btn-text');

        // Check for referral code in URL (e.g., register.html?ref=MFL123)
        const urlParams = new URLSearchParams(window.location.search);
        const refCodeOrNull = urlParams.get('ref');

        if (refCodeOrNull) {
            document.getElementById('referral-badge').style.display = 'block';
            document.getElementById('ref-display').innerText = refCodeOrNull;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading State
            submitBtn.disabled = true;
            btnText.style.opacity = '0.5';
            loader.style.display = 'block';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const full_name = document.getElementById('full_name').value;
            const phone = document.getElementById('phone').value;

            try {
                // EXACT signup call as per requirements
                const { data, error } = await sb.auth.signUp({
                    email, 
                    password,
                    options: { 
                        data: { 
                            full_name, 
                            phone, 
                            referral_code: refCodeOrNull 
                        } 
                    }
                });

                if (error) throw error;

                if (data.user) {
                    alert('Registration successful! Please check your email for a confirmation link.');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                alert(err.message);
            } finally {
                submitBtn.disabled = false;
                btnText.style.opacity = '1';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
