<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Plans - MFL</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <!-- 1. ALWAYS LOAD SUPABASE CDN FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Investment Plans</h2>
            <a href="dashboard.html" style="color: var(--primary);">Back</a>
        </div>
        
        <div id="product-list">
            <p>Loading plans...</p>
        </div>
    </div>

    <!-- 2. THEN LOAD YOUR SHARED JS (which creates 'sb') -->
    <script src="assets/js/supabase.js"></script>

    <!-- 3. FINALLY RUN YOUR PAGE JS -->
    <script>
        async function loadProducts() {
            const user = await checkAuth(); // Ensures user is logged in
            
            const { data: products, error } = await sb
                .from('products')
                .select('*')
                .eq('is_active', true)
                .order('price', { ascending: true });

            if (error) {
                console.error("Error loading products:", error);
                return;
            }

            const list = document.getElementById('product-list');
            list.innerHTML = '';

            if (!products || products.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">No investment plans available right now.</p>';
                return;
            }

            products.forEach(p => {
                list.innerHTML += `
                    <div class="card product-card" style="margin-bottom: 20px;">
                        <img src="${p.image_url || 'https://via.placeholder.com/300x150?text=MFL+Investment'}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 10px;">
                        <h3 style="margin: 10px 0;">${p.name}</h3>
                        <div style="display: flex; justify-content: space-between; color: var(--text-muted); margin-bottom: 8px;">
                            <span>Price: <b style="color: white;">${money(p.price)}</b></span>
                            <span>Daily: <b style="color: #00a854;">${money(p.daily_income)}</b></span>
                        </div>
                        <div style="margin-bottom: 15px; font-size: 0.85rem; color: var(--text-muted);">
                            Duration: ${p.duration_days} Days | Total Return: <b style="color: white;">${money(p.daily_income * p.duration_days)}</b>
                        </div>
                        <button onclick="buyProduct(${p.id})" class="btn btn-primary">Invest Now</button>
                    </div>
                `;
            });
        }

        async function buyProduct(id) {
            if (!confirm("Are you sure you want to purchase this plan?")) return;
            
            const { data, error } = await sb.rpc('purchase_product', { p_id: id });
            
            if (error) {
                alert("Error: " + error.message);
            } else if (data === 'success') {
                alert("Investment Successful!");
                location.href = 'my-investments.html';
            } else {
                alert(data); // Returns 'Insufficient balance' or other custom RPC string messages
            }
        }

        loadProducts();
    </script>
</body>
</html>
