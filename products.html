<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest - MFL</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 4px;">Investment Plans</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">High-yield daily returns</p>

        <div id="product-list">
            <!-- Loader -->
            <div class="card" style="text-align: center; color: var(--text-muted);">Fetching plans...</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠<br>Home</a>
        <a href="products.html" class="nav-item active">📦<br>Invest</a>
        <a href="my-investments.html" class="nav-item">📈<br>Assets</a>
        <a href="profile.html" class="nav-item">👤<br>Account</a>
    </nav>

    <script src="assets/js/supabase.js"></script>
    <script>
        async function loadProducts() {
            const { data: products } = await sb.from('products').select('*').eq('is_active', true).order('price', { ascending: true });
            const list = document.getElementById('product-list');
            list.innerHTML = '';

            products.forEach(p => {
                list.innerHTML += `
                <div class="card" style="padding: 0; overflow: hidden;">
                    <img src="${p.image_url || 'https://images.unsplash.com/photo-1611974717482-58a252ca00bb?auto=format&fit=crop&q=80&w=400'}" style="width: 100%; height: 160px; object-fit: cover;">
                    <div style="padding: 20px;">
                        <h3 style="margin: 0 0 10px 0;">${p.name}</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                            <div><small style="color: var(--text-muted);">Price</small><br><b>${money(p.price)}</b></div>
                            <div><small style="color: var(--text-muted);">Daily Income</small><br><b style="color: var(--success);">${money(p.daily_income)}</b></div>
                            <div><small style="color: var(--text-muted);">Duration</small><br><b>${p.duration_days} Days</b></div>
                            <div><small style="color: var(--text-muted);">Total Return</small><br><b>${money(p.daily_income * p.duration_days)}</b></div>
                        </div>
                        <button onclick="buyProduct(${p.id})" class="btn btn-primary">Purchase Plan</button>
                    </div>
                </div>`;
            });
        }
        async function buyProduct(id) {
            if (!confirm("Start this investment?")) return;
            const { data, error } = await sb.rpc('purchase_product', { p_id: id });
            if (error) alert(error.message);
            else if (data === 'success') { location.href = 'my-investments.html'; }
            else alert(data);
        }
        loadProducts();
    </script>
</body>
</html>
